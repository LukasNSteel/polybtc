# polybtc bot configuration — $1000 LIVE tier (OPTIMISED, full-window)
#
# Same strategy as config.yaml / config.live250.yaml, with risk/sizing tuned for
# a ~$1000 bankroll. Run with:  python -m bot.main --config config.live1000optimised.yaml --live
#
# WHY THIS CONFIG EXISTS (research/test_caps_1000.py + research/test_seed_robust.py,
# 8-week Binance replay, 12 random fill-race seeds):
#   The $250 tier had to use a LATE-WINDOW gate (last 30s only) because at a tiny
#   bankroll the full-window sniper's 2-month drawdown is ~3x the capital — it
#   would trip the kill switch / go broke before realizing the edge.
#   With $1000 behind it, the better lever is NOT the time gate but right-sized
#   caps + the FULL window. Gating $250-caps to the last 60s cut PnL from +$1,963
#   to +$505; the full window with survivable caps keeps it.
#   Seed sweep (full window, $1000, no kill switch modeled):
#       exp80  (take13/pos26): +$1,401 med, worst DD 62% of cap, survives all 12
#       exp100 (take16/pos32): +$1,514 med, worst DD 84% of cap, survives all 12 <-- USE THIS
#       exp125 (take20/pos40): +$2,042 med, worst DD 104%, BREACHES on 2/12 seeds
#   exp100 is the LARGEST sizing whose worst-case unmanaged 2-month drawdown stays
#   under the $1000 bankroll on every seed. The live kill switch + equity scaling
#   below are additional backstops the backtest does not model, so live drawdown
#   is gentler still. NO sniper time gate here — full window is the point of $1000.
#
# Capital baseline is NOT hardcoded: in --live mode the bot reads the wallet's
# real pUSD collateral at startup and uses it as the equity baseline for the
# kill switch and equity-scaling (see live.seed_from_wallet below). The dollar
# caps here are sized for the ~$1000 tier.

asset: BTC
binance_symbol: BTCUSDT

fees:
  # Modeled per-share taker fee = rate * (p*(1-p))**exponent. The strategy
  # subtracts this from edge to gate snipe/scalp entries AND the portfolio debits
  # it on every taker fill, so an under-stated rate makes both paper PnL and the
  # entry filter too optimistic (waves through trades that are marginal live).
  #
  # GROUND TRUTH (re-confirmed 2026-06-19): Polymarket V2 DOES charge takers on
  # crypto markets. The live BTC up/down markets return feesEnabled=true with
  # feeSchedule {rate: 0.07, exponent: 1, takerOnly: true}, and the V2 docs list
  # Crypto taker rate = 0.07. Our earlier "$0 fee" reading was a measurement
  # artifact: V2 deducts the fee from BALANCE at match time, not from the fill
  # price, so the fill-leg ratio (which we used) can never reveal it.
  #
  # null  -> trust each market's advertised feeSchedule (0.07 exp 1 for crypto). <-- USE THIS
  # 0.0   -> assume no taker fee (only correct if Polymarket disables fees again).
  # 0.07  -> hardcode the crypto rate regardless of what the schedule reports.
  # Physically re-verify with `python -m bot.live_trade_smoke --fire` (FEE CHECK
  # now measures the real collateral balance delta around the fill).
  # VERIFIED 2026-06-22 via --fire: real fill 5.18 sh @ 0.56 charged 0.0172/sh,
  # an exact match to 0.07*p(1-p); the min(p,1-p) variant (0.0308/sh) is refuted.
  assume_taker_rate: null

perp_lead:
  # Binance USDT-M perpetual futures lead spot by a beat in fast moves
  # (price discovery happens on the perp). The bot tracks the rolling
  # perp-spot basis and uses (perp mid - basis) as its spot estimate
  # whenever the perp print is fresher than the spot print. Markets still
  # resolve on spot/Chainlink, so this is only a faster estimator of spot.
  # Disable if your region blocks fstream.binance.com (spot still works).
  enabled: true
  symbol: BTCUSDT
  basis_halflife_sec: 120

coinbase:
  # Coinbase BBO as an independent fast price signal. It enters the
  # composite *basis-adjusted* — (coinbase mid - rolling coinbase-binance
  # basis) — exactly like the perp, so the composite always stays in the
  # Binance price frame. The candle open and settlement reference are
  # Binance prices; blending raw Coinbase levels (which trade $50-100 off
  # Binance) injected a permanent directional skew into P(up) and made
  # session 1781182217 buy DOWN 219 times out of 222 (-$660).
  # Purely additive — if the feed drops, Binance spot drives fair value.
  enabled: true
  symbol: BTC-USD
  weight: 0.5              # Coinbase share in composite spot (Binance gets 1-weight)

liquidations:
  # Binance USDT-M @forceOrder stream. Large liquidation prints often
  # precede fast spot moves — trigger the jump guard to pull MM quotes.
  # Sniper/scalper keep running; a cascade is exactly their moment.
  enabled: true
  min_notional_usd: 50000  # ignore small liquidations
  pause_sec: 8             # MM pause duration per significant liquidation

markets:
  # NOTE on paper settlement: the simulator settles every market on Binance
  # spot klines, including the 5m/15m/4h markets that really resolve via
  # Chainlink BTC/USD. This is a deliberate approximation: model spot, candle
  # open and sim settlement all share the Binance frame, so no systematic
  # bias enters — but individual windows where Chainlink and Binance disagree
  # at the close (a ~$50-100 basis moving in the final seconds) can settle
  # differently than they would live. Treat paper results near 50/50 closes
  # with extra skepticism.
  five_minute: true     # btc-updown-5m-{epoch} markets (resolve via Chainlink BTC/USD)
  fifteen_minute: true  # btc-updown-15m-{epoch} markets (resolve via Chainlink BTC/USD);
                        # the target account's single biggest day-1 volume bucket
  hourly: true          # Bitcoin Up or Down hourly (resolve via Binance BTC/USDT 1h candle)
  four_hour: true       # btc-updown-4h-{epoch} markets (resolve via Chainlink BTC/USD);
                        # lower volume (~$145k/day vs hourly's ~$1M) but same window mechanics

trading:
  # stop placing orders this many seconds before window close, per market kind.
  # Empirically verified (June 2026): both 5m and hourly BTC markets accept
  # orders all the way to expiry. The bot also tracks each market's live
  # accepting_orders flag from the CLOB, so if Polymarket introduces a halt
  # it is honored automatically; raise these for an extra safety margin.
  cutoff_sec_5m: 0
  cutoff_sec_15m: 0
  cutoff_sec_hourly: 0
  cutoff_sec_4h: 0

fair_value:
  vol_halflife_fast_sec: 60    # fast EWMA reacts to vol bursts
  vol_halflife_slow_sec: 600   # slow EWMA anchors the baseline; max() of both is used
  min_vol_per_sec: 0.00002     # floor so fair value never divides by ~0
  tail_weight: 0.25            # weight of the wide "jump" regime (fat tails)
  tail_scale: 2.5              # how much wider the jump regime is
  blend_model_weight: 0.65     # weight on our model vs the market mid
                               # (rises toward 0.95 in the final minute)
  # Momentum drift: the zero-drift model overprices the side a trend is
  # fading — session 1781212299's MM fills won only 42% (3-5c of adverse
  # selection per fill) because after every directional run the model kept
  # calling the losing side "cheap" and both MM and sniper bought it.
  # Expected continuation = beta * (return over the last window), scaled by
  # remaining time and clamped in sigma units.
  momentum_window_sec: 60
  momentum_beta: 0.5           # 0 disables; 1 = assume the full run repeats
  momentum_clamp_sigma: 1.5    # cap |drift| at this many diffusion sigmas

market_maker:
  # DISABLED after the June 2026 data study (research/REPORT.md, Test 6):
  # simulated passive bids lose -2 to -3c per fill at EVERY depth from 2c to
  # 8c, on every market kind (CIs exclude zero), and the bot's own live
  # sessions agree (-$173, 251 losing-side vs 211 winning-side fills). Fills
  # only happen when the move reaches the quote and keeps going; the ~0.3c
  # maker rebate cannot close that gap. Symmetric resting quotes on these
  # markets are donations to Binance-watching takers.
  enabled: false
  edge: 0.04                   # quote this far below fair value (4 cents)
  edge_ref_sec: 300            # edge scales by sqrt(t_remaining / this), min 1x:
                               # ~1x for 5m, ~1.7x for 15m, capped for hourly
  edge_max_mult: 3.0           # cap on the horizon multiplier (hourly ~= 12c)
  min_quote: 0.10              # never bid below this: penny bids on a nearly-
                               # decided side are where the fat-tail model
                               # overprices most (mirrors sniper.min_ask)
  max_quote: 0.85              # never bid above this (mirror case)
  max_quote_shares: 150        # share cap per quote, so cheap quotes can't
                               # balloon into 1000-share lots
  inventory_skew: 1.0          # widen the edge up to (1+skew)x as directional
                               # inventory approaches max_position_usd
  quote_size_usd: 10           # USDC notional per quote
  reprice_threshold: 0.015     # move quotes when fair value shifts by this much
  stop_quoting_sec: 25         # pull MM quotes this close to expiry
  max_position_usd: 100        # max cost basis per market window (was 150: the
                               # worst session-1781212299 losers were exactly
                               # cap-sized — the cap is the loss tail)
  # Trend filter: pull the bid on the side a directional run is fading —
  # repricing lags the move, so that quote is structurally stale. Momentum
  # measured as return over trend_window_sec in units of expected vol.
  trend_filter_sigma: 1.2      # pull when momentum exceeds this (0 disables)
  trend_window_sec: 45

sniper:
  # RESHAPED June 12 after live forensics (research/analyze_sessions.py,
  # research/analyze_tau.py — 307 settled paper fills across 9 sessions).
  # The backtested "+55%/$1" snipe realized -19.6%/$1 live. The split:
  #   buying the FAVORITE side (ask >= 0.50): 73% win, +$304, positive on
  #     every market kind and both sides — the genuine book-lags-Binance trade;
  #   buying the UNDERDOG side (ask < 0.50): 18% win, -$1,660, negative
  #     everywhere — betting the model's sign-flip against the market.
  # calibration.csv agrees: where model and market disagree on sign, the
  # market wins (predicted 0.35 -> realized 0.45). The backtest missed this
  # because it assumed we capture every qualifying print; live, 219 FAK
  # orders lost the race, and what we actually filled was adversely selected.
  enabled: true
  min_edge: 0.10               # gate on the dual-beta ROBUST edge (worst-case
                               # P across both regimes)
  max_edge: 0.20               # winner's-curse veto, TIGHTENED 0.25->0.20 (Binance
                               # replay w/ contention+feed_lag: same PnL, ~1/3 less
                               # drawdown). A giant edge still on the book 350ms
                               # after the move is one the fast bots passed on;
                               # live edge>=0.15 fills went 0-for-5 (-104%/$1).
  robust_betas: [0.83, 1.36]   # lead-stickiness regimes fitted per-day on 1,847
                               # markets: ~0.8-0.9 mean-reversion days, ~1.2-1.4
                               # momentum days. Entry must be +EV under BOTH.
  min_ask: 0.50                # FAVORITE-ONLY: never buy the side the market
                               # prices under 50% no matter what the model says.
                               # We trade repricing lag in magnitude, never sign.
                               # (was 0.05; sub-0.5 asks were -33%/$1 live)
  max_ask: 0.80                # above this the snipe edge was fee-dead live
                               # (-21.6%); near-certainty buys belong to the
                               # scalper and its 0.997 probability gate
  max_take_usd: 16             # $1000 tier OPTIMISED: largest per-take whose
                               # full-window 2-month drawdown stays under the
                               # bankroll on all 12 replay seeds (worst 84%).
                               # take20 (exp125) breached $1000 on 2/12 seeds.
  max_position_usd: 32         # per-market snipe cost cap (2x take; ~3.2% of
                               # the $1000 bankroll per market window)
  # PER-KIND late-window gate. The old "full window is the point" rationale was
  # a 5m result applied blindly to every kind — the parquet replay archive is
  # 5m-ONLY, so 15m/1h/4h were never actually backtested. The long-market study
  # (research/test_longmkts_windows.py, real CLOB+Binance data May-Jun 2026:
  # 3,263 15m / 812 1h / 204 4h resolved markets) shows the snipe edge sits in a
  # DIFFERENT fraction of each window, so the gate is now per-kind:
  #   5m : FULL window  - every t_rem band is +EV; gating only sheds PnL (the 5m
  #                        parquet replay agrees: full window is the most +EV).
  #   15m: FULL window  - like 5m: +EV across the WHOLE window. The earliest band
  #                        (t_rem 600-900s) is +28-30%/$1 and spread-robust, so a
  #                        gate just sheds ~28% of gross PnL for a modest DD cut.
  #   1h : last 900s    - the (900,1800]s band is weak (+9%/$1) and NOT
  #                        spread-robust; edge concentrates in the final ~15min.
  #   4h : last 300s    - early/mid window is NEGATIVE under realistic spreads
  #                        (full-window 4h -> -7%/$1 at a 3c spread); essentially
  #                        ALL of the edge is in the final ~5min.
  # A kind key overrides the global max_t_rem_sec; 0/unset = full window.
  max_t_rem_sec: 0             # global fallback (0 = full window)
  max_t_rem_sec_5m: 0          # 5m: full window
  max_t_rem_sec_15m: 0         # 15m: full window (early band is +EV & spread-robust)
  max_t_rem_sec_hourly: 900    # 1h: last 15 min
  max_t_rem_sec_4h: 300        # 4h: last 5 min
  min_t_rem_sec: 0             # 0 = trade down to settlement
  max_inventory_frac: 0.25     # skip a side once net same-side inventory exceeds
                               # this fraction of max_position_usd: stacking one
                               # side on the same lagging signal built every
                               # cap-sized loser in session 1781212299
  limit_slack_ticks: 2         # tolerance on the FAK limit (ticks above the
                               # signal ask). Zero slack rejects on any uptick
                               # during the speed-bump hold even when our fair
                               # richened too; +2 ticks recaptured ~38% of those
                               # rejects at ~1.3c/share, all +EV, with no extra
                               # adverse selection (research/analyze_taker_widen.py)

scalper:
  # Restricted after the June 2026 study (research/REPORT.md, Test 3):
  # late high-price buys are +EV on 1h (+2.2%/$1, 14/15 days green) and mildly
  # positive on 15m, but NEGATIVE on 5m (-1.7%/$1; -4.6% at 0.97-0.99 with
  # 30-60s left) and untested on 4h. Anything at 0.99+ is fee-dead everywhere.
  enabled: true
  kinds: [15m, 1h]             # 5m and 4h excluded — see above
  window_sec: 60               # only act in the final N seconds
  min_tau_sec: 15              # ...but not the very last seconds: resolution-
                               # source noise (Chainlink/Binance close prints)
                               # is concentrated there
  min_tau_sec_15m: 5           # 15m can run closer to the wire — the study's
                               # best 15m scalp bucket is tau 5-30s (+3-6%/$1)
  min_prob: 0.997              # fair probability must exceed this
  min_price: 0.90              # the scalp thesis is paying up for near-certainty;
                               # a cheap ask on a "certain" side means the whole
                               # market disagrees with the model and wins that
                               # argument (it can also see the resolution source)
  max_price: 0.99              # was 0.999: above 0.99 the fee eats the entire
                               # edge (+0.3-0.6%/$1 at best, n.s.)
  max_usd: 30                  # $1000 tier: max USDC per scalp. Modest vs the
                               # sniper because the scalp shares the same total
                               # exposure pool (risk.max_total_exposure_usd) and
                               # the replay sizing study only covers the sniper.
  limit_slack_ticks: 2         # FAK limit tolerance (ticks); capped at max_price
                               # so a probe never pays past the tested band

guards:
  # Adverse-selection defenses for the MM leg (the sniper/scalper are
  # unaffected — a jump is exactly when they should act).
  # Jump guard: when BTC moves more than jump_sigma standard deviations
  # (floored at jump_min_move_bps) inside the window, pull all MM quotes
  # and pause re-quoting — our resting bids are the stale quotes mid-burst.
  jump_window_sec: 3
  jump_sigma: 5.0
  jump_min_move_bps: 5
  jump_cooldown_sec: 10
  # Quote fading: each MM fill on a side pushes that side's next quote this
  # much further from fair (decaying window, capped) — a fast informed
  # trader can't clear us out repeatedly at one stale level.
  # (session 1781170769: 65% of MM fills ended on the losing side with the
  # old 0.005/0.02 fade — half a tick per fill was no deterrent at all;
  # session 1781212299 measured 3-5c adverse selection per fill, so the cap
  # must exceed that or the fade saturates below the toxicity level)
  fade_per_fill: 0.03
  fade_window_sec: 60
  fade_max: 0.10
  # Same-side fill breaker: this many MM fills on one side within the window
  # stops quoting that side for the cooldown. Two fills are already signal,
  # not noise (the third+ fills in session 1781212299 all lost), and 420s
  # keeps a tripped side off for the remainder of any 5m window instead of
  # re-arming into the same trend after 180s.
  breaker_fills: 2
  breaker_window_sec: 60
  breaker_cooldown_sec: 420
  # Markouts: post-fill book-mid drift at these horizons, reported per leg
  # in the session summary. Persistently negative MM markouts mean the flow
  # hitting our quotes is informed — widen market_maker.edge.
  markout_horizons_sec: [10, 60]

risk:
  max_total_exposure_usd: 100  # $1000 tier OPTIMISED: the binding risk lever. The
                               # seed sweep tested THIS value (exp100) as the
                               # largest full-window exposure cap whose worst-case
                               # 2-month drawdown stayed under $1000 on all seeds.
  max_total_exposure_ceiling: 150  # hard book ceiling even when equity-scaled up.
                               # Only reached if equity grows to ~$2250 (sqrt
                               # scaling), where 150 is again a safe fraction.
  kill_switch_loss_usd: 100    # floor: minimum absolute session drawdown stop (~10%)
  kill_switch_loss_frac: 0.30  # session drawdown stop = this fraction of session-start equity
  kill_switch_loss_cap_usd: 300  # ceiling on the proportional kill limit (~30% of $1000).
                               # This is the live backstop the backtest does NOT
                               # model: a session halts at -$300 long before any
                               # 2-month cumulative drawdown could approach $1000.
  max_feed_age_sec: 5          # pull all quotes if the price feed stalls this long
  vol_warmup_sec: 90           # no sniper/scalper trades until the vol EWMA has
                               # this many seconds of samples. At cold start vol
                               # sits at the min_vol floor (~3x too low), the
                               # model's d is inflated ~3x, and tiny wobbles
                               # around the candle open read as 11-14c edges on
                               # BOTH sides in sequence (session 1781248550:
                               # -$67 in the first 14 seconds of the session)

sizing:
  # Bidirectional equity scaling: sqrt grows with profits, shrinks on drawdown.
  # Exposure scales the same way, capped at risk.max_total_exposure_ceiling.
  enabled: true
  mode: sqrt                   # sqrt(equity/ref) or step at equity_tiers
  reference_equity: 1000       # the $1000 baseline these caps were tuned around.
                               # In --live with seed_from_wallet the wallet-read
                               # equity overrides this; keep it ~= your funded
                               # balance so scaling pivots around real capital.
  min_scale: 0.5               # never shrink below 50% of base caps on drawdown
  equity_tiers: [2000, 4000, 10000]   # step mode only (scaled for the $1000 tier)
  tier_multipliers: [1.0, 1.25, 1.5, 2.0]  # below $2000, then each tier
  max_take_usd_cap: 32         # absolute ceiling on scaled snipe/scalp takes
                               # (2x base; matches the per-market cap)
  max_position_usd_cap: 64     # absolute ceiling on per-market snipe cost (2x base)
  scale_exposure: true         # scale max_total_exposure_usd with equity scale

presign:
  # EIP-712 pre-signing for the snipe/scalp taker path.
  #
  # The background presigner ALWAYS pre-warms the CLOB market-info cache
  # (tick size / neg-risk / condition map) for active tokens, regardless of
  # `enabled` — without it the FIRST taker order per market pays a hidden
  # network round trip inside create_market_order. That prewarm is free
  # (changes nothing about sizing) and removes a cold-start latency spike.
  #
  # With `enabled: true` it also keeps a small LADDER of pre-signed FAK BUY
  # orders around each token's live best ask, so firing a snipe is just an
  # HTTP POST (the ~few ms of signing already happened off the hot path).
  # A FAK's collateral stake = price x shares varies per fire, so the ladder
  # is built over (price level, $ stake bucket). On the fast path the bot
  # uses a pre-signed order whose bucket is <= the desired stake and within
  # `amount_tol` of it (so it NEVER oversizes); anything else falls back to
  # live signing with identical behavior.
  #
  # OFF by default: turning it on means a fast-path snipe snaps its stake
  # DOWN to the nearest pre-signed bucket. Tune the buckets to your real
  # snipe/scalp stake range (sniper.max_take_usd, scalper.max_usd).
  enabled: false
  refresh_sec: 2.0           # rebuild/refresh the ladder this often
  price_radius_ticks: 1      # pre-sign +/- this many ticks around the live best ask
  amount_buckets_usd: [5, 10, 15, 30]  # collateral stake buckets to pre-sign ($1000 tier)
  amount_tol: 0.7            # fast path only if a bucket is >= this fraction of desired stake
  max_age_sec: 45            # drop pre-signed orders older than this (kept fresh vs the book)

fak_monitor:
  # Graduated race-loss response: adjust live first, pause only when severe.
  enabled: true
  mode: graduated              # graduated | adjust | pause
  min_fill_rate: 0.50          # tier 1: soft compression (proportional size cut)
  hard_fill_rate: 0.40         # tier 2: hard compression (0.5x size, tighter edge)
  pause_fill_rate: 0.30        # tier 3: pause takers (graduated mode only)
  min_attempts: 10             # need this many outcomes in the rolling window
  window_size: 30
  min_edge_bump: 0.02          # tier 1: raise sniper min_edge by this
  hard_size_mult: 0.5          # tier 2: force this size multiplier
  snipe_cooldown_sec: 10       # base snipe cooldown (tier 1)
  hard_snipe_cooldown_sec: 20  # tier 2 snipe cooldown
  scalp_cooldown_sec: 15       # base scalp cooldown (tier 1)
  revert_scaling_on_stress: true  # revert equity scaling at tier 1+
  pause_cooldown_sec: 90       # tier-3 recovery valve: after this many seconds
                               # of taker inactivity (i.e. while paused), forget
                               # the stale rolling window and half-open probe at
                               # tier 2 (0.5x). Prevents a transient bad streak
                               # from freezing takers permanently — the window
                               # can't otherwise refresh while takers are paused.

paper:
  # IGNORED in --live mode: the equity baseline is read from the wallet
  # (live.seed_from_wallet). Only used for paper runs against this config.
  starting_cash: 1000
  # execution realism. Taker (snipe/scalp) orders model the itode speed-bump
  # mechanism: total tick-to-trade budget is taker_latency_ms (Binance-Tokyo
  # signal travel + Dublin decide/submit + the mandatory speed bump). The last
  # speed_bump_ms of that budget is a FROZEN, UNCANCELLABLE hold — once the
  # order is submitted it is committed for the whole bump, cannot be pulled,
  # and is re-validated against the book only at the END of the hold. If the
  # side richened during the hold (BTC moved in our favour) the cheap quote is
  # gone and the FAK is rejected; if it cheapened (BTC moved against us) we are
  # committed and filled anyway — adverse selection. Set taker_latency_ms 0 to
  # restore instant (optimistic) fills.
  taker_latency_ms: 410      # top of the identified tick-to-trade range (was 350)
  speed_bump_ms: 250         # mandatory uncancellable itode hold (subset of the budget)
  cancel_latency_ms: 150     # applies to resting MM (GTC) quotes only

  # Snipe fill-realism haircut. The base model wins the FULL displayed size of
  # every stale cheap quote, uncontested — the dominant reason paper PnL
  # overstates live (validated on session 1781777645: +108%/4.5h, 88% win rate,
  # almost all PnL from the fattest, most-contested snipes). These model the race
  # you actually face from Dublin. Tune `capture`/`race_loss_prob` from live data
  # once the shadow logger reports your real fill-capture rate.
  fill_realism:
    enabled: true
    capture: 0.30            # avg fraction of displayed top-of-book size we win
    edge_contention: true    # richer (more underpriced) quotes are more contested:
                             # capture scales to ~0 as the discount to mid hits ~10c
    race_loss_prob: 0.20     # chance a faster arb takes the whole quote first (miss)
    feed_lag_ms: 150         # our WS book trails the engine; re-validate vs a book
                             # this much fresher (favourable moves richen away)

live:
  # secrets come from environment variables, never from this file:
  #   POLYMARKET_PRIVATE_KEY  - EOA private key
  #   POLYMARKET_FUNDER       - address holding funds (proxy wallet, or the EOA itself)
  host: https://clob.polymarket.com
  chain_id: 137
  # 0 = plain EOA — REJECTED by the V2 venue ("use the deposit wallet flow").
  # 1 = email/magic proxy, 2 = browser-wallet Gnosis Safe, 3 = POLY_1271 deposit
  # wallet. Confirmed type 3 for this funder via `python -m bot.sigtype_probe`
  # (the only type the maker isn't rejected on). Requires POLYMARKET_FUNDER.
  signature_type: 3
  # Seed the equity baseline (kill switch + sizing reference) from the wallet's
  # real pUSD collateral at startup instead of paper.starting_cash. Set false to
  # fall back to the configured starting_cash.
  seed_from_wallet: true
  # public Polygon RPC for on-chain merge/redeem. polygon-rpc.com now returns
  # 401, so default to publicnode; swap in a private RPC (Alchemy/Infura) for
  # production reliability from your Dublin box.
  polygon_rpc: https://polygon-bor-rpc.publicnode.com

